# ──────────────────────────────────────────────────────────────
# Tennessee geography config (Workstream A / Phase 2).
#
# Florida config in cities.yaml is UNTOUCHED — this is purely additive.
#
# Seeded on first boot into the reference tables:
#   • city_tiers   ← `cities` below  (P2a)
#   • territories  ← `exclusions` below  (P2b)
#
# City prioritization (spec):
#   tier 1 = named priority cities (scraped first, no population filter)
#   tier 2 = other TN cities with population >= 50,000
# This is a PRECOMPUTED STATIC list (predictable; refresh manually when needed).
#
# radius_miles here = the VENDOR search radius (20 mi from each city center).
# The CONTRACTOR radius (50 mi) anchors on dealer_accounts, not on these cities.
# Coordinates are approximate city centers.
# ──────────────────────────────────────────────────────────────
state: TN

cities:
  # ── Tier 1 — named priority cities (regardless of population) ──
  - city: Pigeon Forge
    county: Sevier
    tier: 1
    center_lat: 35.7884
    center_lng: -83.5543
    radius_miles: 20
    population: 6343          # < 50k but explicitly required
