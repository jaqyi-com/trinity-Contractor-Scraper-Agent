# ── Hard territory exclusions (seeded into `territories` in P2b) ──
# Memphis metro must NEVER be scraped or returned.
exclusions:
  - region_name: Memphis Metro
    kind: exclude
    match_type: city
    match_values:
      - Memphis
      - Bartlett
      - Germantown
      - Collierville
      - Millington
      - Lakeland
      - Arlington
    notes: Far-southwest TN / Memphis metro — hard exclusion per spec.
