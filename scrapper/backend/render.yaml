# Render Blueprint — auto-deploys on every git push to main
# Usage: Render Dashboard → New → Blueprint → connect repo → select this file
services:
  - type: web
    name: contractor-scraper-api
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: data-disk
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: POSTGRES_DSN
        sync: false                # Set manually in dashboard
      - key: OUTSCRAPER_API_KEY
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: PDL_API_KEY
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: FRONTEND_URL
        value: https://contractor-scraper.vercel.app
      - key: DATA_DIR
        value: /var/data
      - key: EXPORT_DIR
        value: /var/data/exports
